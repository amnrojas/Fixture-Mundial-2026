<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial FIFA 2026 – Fixture Completo (Hora Paraguay)</title>
<style>
/* ===== VARIABLES ===== */
:root {
  --azul: #0a1f5c;
  --rojo: #c8102e;
  --verde: #009a44;
  --gris: #f0f2f5;
  --borde: #dde1e7;
  --texto: #1a1a2e;
  --oro: #d4a017;
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--gris); color: var(--texto); font-size: 20px; }

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, var(--azul) 0%, #1a3a8f 50%, var(--azul) 100%);
  color: white; text-align: center; padding: 18px 10px 12px;
  border-bottom: 4px solid var(--rojo);
}
.header h1 { font-size: 1.8em; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
.header p { font-size: 0.85em; opacity: 0.85; margin-top: 4px; }
.header .flags { font-size: 1.5em; letter-spacing: 6px; margin-bottom: 4px; }
.badge { display: inline-block; background: var(--rojo); color: white; font-size: 0.7em; padding: 2px 8px; border-radius: 12px; margin-top: 6px; }

/* ===== TABS ===== */
.tabs { display: flex; background: var(--azul); padding: 0 16px; gap: 4px; overflow-x: auto; }
.tab-btn {
  background: none; border: none; color: rgba(255,255,255,0.65); padding: 10px 16px;
  cursor: pointer; font-size: 0.85em; font-weight: 600; white-space: nowrap;
  border-bottom: 3px solid transparent; transition: all 0.2s;
}
.tab-btn.active, .tab-btn:hover { color: white; border-bottom-color: var(--oro); }

/* ===== MAIN CONTENT ===== */
.main { max-width: 1400px; margin: 0 auto; padding: 16px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== GRUPOS SECTION ===== */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 14px;
}
.group-card {
  background: white; border-radius: 8px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid var(--borde);
}
.group-header {
  background: var(--azul); color: white; padding: 8px 12px;
  display: flex; align-items: center; gap: 10px; font-weight: 700;
}
.group-letter {
  width: 32px; height: 32px; background: var(--rojo); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 1em; font-weight: 900;
}

/* ===== GROUP TABLE ===== */
.standings-table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
.standings-table th {
  background: #e8ecf4; color: var(--azul); font-weight: 700;
  padding: 5px 6px; text-align: center; font-size: 0.78em; text-transform: uppercase;
}
.standings-table th:first-child { text-align: left; padding-left: 10px; }
.standings-table td { padding: 5px 6px; text-align: center; border-bottom: 1px solid #f0f2f5; }
.standings-table td:first-child { text-align: left; padding-left: 10px; font-weight: 600; }
.standings-table tr:last-child td { border-bottom: none; }
.standings-table tr:hover td { background: #f8f9fc; }
.pos-1, .pos-2 { background: rgba(0, 154, 68, 0.08); }
.pts-cell { font-weight: 700; color: var(--azul); }
.qualify-line {
  border-top: 2px solid var(--verde) !important;
}

/* ===== MATCHES LIST IN GROUP ===== */
.group-matches { border-top: 1px solid var(--borde); }
.match-row {
  display: grid; grid-template-columns: 60px 1fr auto 1fr 1fr;
  align-items: center; gap: 4px; padding: 6px 10px;
  border-bottom: 1px solid #f5f5f5; font-size: 0.8em;
}
.match-row:last-child { border-bottom: none; }
.match-date { color: #666; font-size: 0.78em; }
.match-time { color: var(--rojo); font-weight: 700; font-size: 0.82em; }
.team-home { text-align: right; font-weight: 600; }
.team-away { text-align: left; font-weight: 600; }
.score-box {
  display: flex; align-items: center; gap: 3px; justify-content: center;
}
.score-input {
  width: 30px; height: 26px; text-align: center; border: 1.5px solid var(--borde);
  border-radius: 4px; font-size: 0.9em; font-weight: 700; color: var(--azul);
  transition: border-color 0.2s;
}
.score-input:focus { outline: none; border-color: var(--azul); background: #f0f4ff; }
.score-sep { font-weight: 700; color: #999; }
.stadium-info { color: #888; font-size: 0.72em; grid-column: 1 / -1; padding-left: 2px; }

/* ===== SCHEDULE BY DATE ===== */
.day-block { margin-bottom: 20px; }
.day-header {
  background: var(--azul); color: white; padding: 8px 14px;
  border-radius: 6px 6px 0 0; font-weight: 700; display: flex; align-items: center; gap: 10px;
}
.day-badge { background: var(--rojo); padding: 2px 8px; border-radius: 12px; font-size: 0.8em; }
.day-matches { background: white; border-radius: 0 0 6px 6px; border: 1px solid var(--borde); border-top: none; }
.sched-match {
  display: grid; grid-template-columns: 55px 28px 1fr auto 1fr 140px;
  align-items: center; gap: 8px; padding: 7px 14px;
  border-bottom: 1px solid #f5f5f5; font-size: 0.85em;
}
.sched-match:last-child { border-bottom: none; }
.sched-match .grp-tag {
  background: var(--azul); color: white; border-radius: 10px;
  font-size: 0.72em; font-weight: 700; padding: 1px 6px; text-align: center;
}
.sched-stadium { color: #777; font-size: 0.78em; text-align: right; }

/* ===== KNOCKOUT ===== */
.knockout-phase { margin-bottom: 24px; }
.phase-title {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.phase-title h3 {
  background: var(--azul); color: white; padding: 6px 16px; border-radius: 20px;
  font-size: 0.95em; text-transform: uppercase; letter-spacing: 1px;
}
.ko-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.ko-match {
  background: white; border-radius: 8px; padding: 10px 14px;
  border: 1px solid var(--borde); box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.ko-match-info { font-size: 0.78em; color: #666; margin-bottom: 6px; }
.ko-teams {
  display: flex; align-items: center; gap: 8px; font-weight: 600;
}
.ko-team { flex: 1; }
.ko-team:last-child { text-align: right; }
.ko-score { display: flex; gap: 4px; align-items: center; }
.ko-stadium { font-size: 0.72em; color: #888; margin-top: 4px; }

/* ===== PRINT VIEW (screen preview) ===== */
#tab-imprimir {
  background: #c8c8c8;
  padding: 16px;
  min-height: 100vh;
}
.pv-page {
  background: white;
  width: 277mm;
  min-height: 190mm;
  margin: 0 auto 16px;
  padding: 6mm 6mm 5mm;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 12pt;
  color: #111;
  position: relative;
}
/* ---- Print header ---- */
.pv-header {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3pt solid #0a1f5c; margin-bottom: 4pt; padding-bottom: 3pt;
}
.pv-header-left { display: flex; align-items: center; gap: 6pt; }
.pv-trophy { font-size: 20pt; line-height:1; }
.pv-title { }
.pv-title h1 { font-size: 13pt; font-weight: 900; color: #0a1f5c; letter-spacing: 0.5pt; text-transform: uppercase; line-height:1; }
.pv-title p { font-size: 6pt; color: #555; margin-top: 1pt; }
.pv-header-mid {
  text-align: center;
}
.pv-header-mid .pv-dates {
  font-size: 7pt; font-weight: 700; color: #0a1f5c;
}
.pv-header-mid .pv-hosts {
  font-size: 8pt; margin-top: 2pt;
}
.pv-tz-badge {
  background: #c8102e; color: white; font-size: 6pt; font-weight: 700;
  padding: 2pt 6pt; border-radius: 8pt;
}
.pv-py-badge {
  background: #009a44; color: white; font-size: 6pt; font-weight: 700;
  padding: 2pt 6pt; border-radius: 8pt; margin-left: 4pt;
}

/* ---- Phase label ---- */
.pv-phase-label {
  display: flex; align-items: center; gap: 6pt; margin-bottom: 4pt; margin-top: 5pt;
}
.pv-phase-label .pv-pl-line { flex:1; height: 1.5pt; background: #0a1f5c; }
.pv-phase-label span {
  background: #0a1f5c; color: white; font-size: 7pt; font-weight: 800;
  padding: 2pt 8pt; border-radius: 10pt; letter-spacing: 0.5pt; text-transform: uppercase;
}

/* ---- Groups grid ---- */
.pv-groups-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4pt;
}
.pv-group {
  border: 1pt solid #c0cce0;
  border-radius: 3pt;
  overflow: hidden;
}
.pv-group-hdr {
  padding: 2.5pt 5pt;
  display: flex; align-items: center; gap: 4pt;
  color: white; font-weight: 800; font-size: 7pt;
}
.pv-group-letter {
  width: 13pt; height: 13pt; border-radius: 50%;
  background: rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 8pt; font-weight: 900; flex-shrink: 0;
}
/* Group header colors */
.gh-A { background: #0a1f5c; }
.gh-B { background: #1a5276; }
.gh-C { background: #1a3a8f; }
.gh-D { background: #006400; }  /* GREEN for Paraguay's group */
.gh-E { background: #7b241c; }
.gh-F { background: #4a235a; }
.gh-G { background: #154360; }
.gh-H { background: #7d6608; }
.gh-I { background: #0e6655; }
.gh-J { background: #6e2f0a; }
.gh-K { background: #1b4332; }
.gh-L { background: #c0392b; }

/* Standings mini-table */
.pv-standings { width: 100%; border-collapse: collapse; border-bottom: 1pt solid #e0e6f0; }
.pv-standings th {
  background: #eef1f8; font-size: 5.5pt; font-weight: 700; text-align: center;
  padding: 1.5pt 2pt; color: #0a1f5c; border-bottom: 0.5pt solid #c0cce0;
}
.pv-standings th:first-child { text-align: left; padding-left: 4pt; }
.pv-standings td { font-size: 5.8pt; padding: 1.5pt 2pt; text-align: center; border-bottom: 0.5pt solid #f0f2f5; }
.pv-standings td:first-child { text-align: left; padding-left: 4pt; font-weight: 600; }
.pv-standings .pts-td { font-weight: 800; color: #0a1f5c; }
.pv-q1, .pv-q2 { background: #e8f5e9; }
.pv-q3-line td { border-top: 1pt dashed #009a44; }

/* Match rows */
.pv-match {
  padding: 2pt 4pt 1pt;
  border-bottom: 0.5pt solid #e8eef5;
}
.pv-match:last-child { border-bottom: none; }
.pv-match-main { display: flex; align-items: center; gap: 2pt; }
.pv-m-date { font-size: 9pt; color: #0a1f5c; min-width: 20pt; flex-shrink:0; }
.pv-m-time { font-size: 9pt; font-weight: 900; color: #5c0715; min-width: 26pt; flex-shrink:0; }
.pv-m-home { flex: 1; text-align: right; font-weight: 800; font-size: 9pt; }
.pv-m-score {
  display: flex; align-items: center; gap: 1.5pt; flex-shrink:0;
  background: #eef2fa; border-radius: 2pt; padding: 1.5pt 3pt;
}
.pv-m-box {
  width: 14pt; height: 13pt; border: 1pt solid #999; border-radius: 2pt;
  background: white; display: inline-block;
  font-size: 8pt; font-weight: 900; color: #0a1f5c;
  text-align: center; line-height: 13pt;
}
.pv-m-colon { font-size: 7pt; color: #999; font-weight: 900; }
.pv-m-away { flex: 1; font-weight: 800; font-size: 9pt; }
.pv-m-stad { font-size: 5.2pt; color: #38790e; padding: 0.5pt 0 2pt 46pt; font-style: italic; }

/* ---- Knockout section ---- */
.pv-ko-phases { display: flex; flex-direction: column; gap: 7pt; }
.pv-ko-phase { }
.pv-ko-phase-label {
  font-size: 6.5pt; font-weight: 800; text-transform: uppercase; color: #0a1f5c;
  border-left: 3pt solid #c8102e; padding-left: 4pt; margin-bottom: 2pt;
  letter-spacing: 0.3pt;
}
.pv-ko-phase-label.final-label {
  border-left-color: #d4a017; color: #7d6608;
}
.pv-ko-grid { display: flex; flex-wrap: wrap; gap: 3pt; }
.pv-ko-match {
  border: 0.8pt solid #c0cce0; border-radius: 3pt; padding: 2pt 4pt;
  min-width: 80pt; flex: 1;
  background: #fafbfe;
}
.pv-ko-match.final-match {
  background: #fffbea; border-color: #d4a017; border-width: 1pt;
}
.pv-ko-info { font-size: 5.5pt; color: #666; margin-bottom: 2pt; }
.pv-ko-teams { display: flex; align-items: center; gap: 3pt; }
.pv-ko-team { flex: 1; font-size: 7pt; font-weight: 800; color: #111; }
.pv-ko-team:last-child { text-align: right; }
.pv-ko-score { display: flex; align-items: center; gap: 1.5pt; }
.pv-ko-box {
  width: 13pt; height: 12pt; border: 1pt solid #aaa; border-radius: 2pt;
  background: white; display: inline-block; text-align: center; line-height: 12pt;
  font-size: 7.5pt; font-weight: 900;
}
.pv-ko-stad { font-size: 5pt; color: #888; margin-top: 2pt; font-style: italic; }

/* Legend */
.pv-legend {
  margin-top: 4pt; padding-top: 3pt; border-top: 0.5pt solid #ddd;
  display: flex; gap: 10pt; font-size: 5.2pt; color: #666;
}

/* ===== ACTUAL PRINT ===== */
@media print {
  @page { size: A4 landscape; margin: 0; }
  body { background: white; }
  .header, .tabs, .tab-btn, .print-hide { display: none !important; }
  .tab-content { display: none !important; }
  #tab-imprimir { display: block !important; background: white; padding: 0; }
  .main { padding: 0; max-width: none; }
  .pv-page {
    box-shadow: none; width: auto; margin: 0; padding: 6mm 6mm 5mm;
    page-break-after: always;
  }
  .pv-page:last-child { page-break-after: avoid; }
}
</style>
</head>

// =====================================================
// TIMEZONE
// =====================================================
const USER_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
const USER_OFFSET_MIN = -new Date().getTimezoneOffset();
const PY_OFFSET_MIN = -180;
let showLocalTime = USER_OFFSET_MIN !== PY_OFFSET_MIN;

const MONTH_ES_MAP = {'Jun':5,'Jul':6};
const DAY_ES_ARR = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function parseMatchDate(dtStr){
  const [,d,mon] = dtStr.split(' ');
  return new Date(2026, MONTH_ES_MAP[mon], parseInt(d));
}
function fmtDate(d){
  return `${DAY_ES_ARR[d.getDay()]} ${d.getDate()} ${d.getMonth()===5?'Jun':'Jul'}`;
}
function getDisplayTime(timeStr, dateStr){
  if(!showLocalTime) return {time:timeStr, date:dateStr, dayMark:''};
  const [h,mn] = timeStr.split(':').map(Number);
  const base = parseMatchDate(dateStr);
  const utcMs = Date.UTC(2026, base.getMonth(), base.getDate(), h+3, mn);
  const local = new Date(utcMs);
  const lh = local.getHours(), lm = local.getMinutes();
  const localTime = `${String(lh).padStart(2,'0')}:${String(lm).padStart(2,'0')}`;
  const localDate = fmtDate(local);
  const localMid = new Date(local.getFullYear(), local.getMonth(), local.getDate());
  const baseMid  = new Date(base.getFullYear(), base.getMonth(), base.getDate());
  const dayDiff  = Math.round((localMid - baseMid) / 86400000);
  const dayMark  = dayDiff > 0 ? ` <span style="color:var(--rojo);font-size:0.8em">+${dayDiff}d</span>` : dayDiff < 0 ? ` <span style="color:var(--rojo);font-size:0.8em">${dayDiff}d</span>` : '';
  return {time:localTime, date:localDate, dayMark};
}
function fmtOffset(min){
  const s=min>=0?'+':'-', a=Math.abs(min), h=Math.floor(a/60), m=a%60;
  return `UTC${s}${h}${m?':'+String(m).padStart(2,'0'):''}`;
}
function toggleTimezone(){
  showLocalTime = !showLocalTime;
  updateTZBar();
  refreshAll();
}
function updateTZBar(){
  const info=document.getElementById('tzInfo');
  const btn=document.getElementById('tzToggleBtn');
  if(!info||!btn) return;
  if(showLocalTime){
    info.textContent=`🕐 ${USER_TZ} (${fmtOffset(USER_OFFSET_MIN)})`;
    btn.textContent='🇵🇾 Ver hora PY';
  } else {
    info.textContent='🕐 Hora Paraguay (UTC-3)';
    btn.textContent='🌍 Ver hora local';
  }
}

// =====================================================
// CALCULATE STANDINGS
// =====================================================
function calcStandings(grp) {
  const teams = GROUPS[grp];
  const table = {};
  teams.forEach(t => table[t] = {pj:0, g:0, e:0, p:0, gf:0, gc:0, gd:0, pts:0});

  MATCHES.filter(m => m.g === grp).forEach(m => {
    const sc = scores[m.id];
    if (!sc || sc.h === '' || sc.a === '') return;
    const sh = parseInt(sc.h), sa = parseInt(sc.a);
    if (isNaN(sh) || isNaN(sa)) return;
    if (!table[m.h] || !table[m.a]) return;

    table[m.h].pj++; table[m.a].pj++;
    table[m.h].gf += sh; table[m.h].gc += sa;
    table[m.a].gf += sa; table[m.a].gc += sh;
    table[m.h].gd = table[m.h].gf - table[m.h].gc;
    table[m.a].gd = table[m.a].gf - table[m.a].gc;

    if (sh > sa) {
      table[m.h].g++; table[m.h].pts += 3; table[m.a].p++;
    } else if (sh < sa) {
      table[m.a].g++; table[m.a].pts += 3; table[m.h].p++;
    } else {
      table[m.h].e++; table[m.a].e++;
      table[m.h].pts++; table[m.a].pts++;
    }
  });

  return Object.entries(table)
    .map(([name, s]) => ({name, ...s}))
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name));
}

function renderGroups() {
  const cont = document.getElementById('groupsGrid');
  cont.innerHTML = '';
  Object.keys(GROUPS).forEach(grp => {
    const card = document.createElement('div');
    card.className = 'group-card';
    const isMyGrp = grp === getMyTeamGroup();
    const myFlag = TEAM_FLAGS[myTeam]||'⚽';
    card.innerHTML = `
      <div class="group-header" style="${isMyGrp?'background:#006400;':''}">
        <div class="group-letter">${grp}</div>
        <span>GRUPO ${grp}${isMyGrp?' '+myFlag:''}</span>
      </div>
      ${renderStandingsTable(grp)}
      <div class="group-matches">${renderGroupMatches(grp)}</div>
    `;
    cont.appendChild(card);
  });
}

function renderStandingsTable(grp) {
  const rows = calcStandings(grp);
  let html = `<table class="standings-table">
    <thead><tr>
      <th>#</th><th style="text-align:left;padding-left:10px">Selección</th>
      <th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th>
    </tr></thead><tbody>`;
  rows.forEach((r, i) => {
    const rowCls = i < 2 ? 'pos-1' : '';
    const qual = i === 2 ? 'qualify-line' : '';
    html += `<tr class="${rowCls}">
      <td class="${qual}" style="font-weight:700;color:#666">${i+1}</td>
      <td class="${qual}" style="text-align:left;padding-left:10px;font-weight:600">${r.name}</td>
      <td class="${qual}">${r.pj}</td><td class="${qual}">${r.g}</td>
      <td class="${qual}">${r.e}</td><td class="${qual}">${r.p}</td>
      <td class="${qual}">${r.gf}</td><td class="${qual}">${r.gc}</td>
      <td class="${qual}">${r.gd > 0 ? '+'+r.gd : r.gd}</td>
      <td class="${qual} pts-cell">${r.pts}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  return html;
}

function renderGroupMatches(grp) {
  return MATCHES.filter(m => m.g === grp).map(m => {
    const sc = getScore(m.id);
    const isMT = isMyTeam(m);

// Build a fast lookup: "HomeTeam|AwayTeam" → match id
const MATCH_LOOKUP = {};
MATCHES.forEach(m => { MATCH_LOOKUP[`${m.h}|${m.a}`] = m.id; });

// Knockout lookup: Paraguay "YYYYMMDD|HH:MM" → knockout match id
const KO_MON = {'Jun':'06','Jul':'07'};
const KO_TIME_LOOKUP = {};
KNOCKOUT.forEach(phase => phase.matches.forEach(m => {
  const [,d,mon] = m.dt.split(' ');
  const ymd = `2026${KO_MON[mon]}${String(parseInt(d)).padStart(2,'0')}`;
  KO_TIME_LOOKUP[`${ymd}|${m.t}`] = m.id;
}));

function espnDateToKoKey(utcStr) {
  if (!utcStr) return '';
  const py = new Date(new Date(utcStr).getTime() - 3 * 60 * 60 * 1000);
  const ymd = `${py.getUTCFullYear()}${String(py.getUTCMonth()+1).padStart(2,'0')}${String(py.getUTCDate()).padStart(2,'0')}`;
  const t   = `${String(py.getUTCHours()).padStart(2,'0')}:${String(py.getUTCMinutes()).padStart(2,'0')}`;
  return `${ymd}|${t}`;
}

let autoRefreshTimer = null;
let lastFetchTime = null;
let liveMatchIds = new Set();

async function fetchDateScores(yyyymmdd) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${yyyymmdd}`;
  const resp = await fetch(url, { cache: 'no-store' });
  if (!resp.ok) return [];
  const data = await resp.json();
  return data.events || [];
}

function dateToYYYYMMDD(d) {
  return d.toISOString().slice(0,10).replace(/-/g,'');
}

async function fetchLiveScores() {
  const now = new Date();
  // Fetch all dates from World Cup start (June 11 2026) to today
  const start = new Date('2026-06-11');
  const dates = [];
  for (let d = new Date(start); d <= now; d.setDate(d.getDate() + 1)) {
    dates.push(dateToYYYYMMDD(new Date(d)));
  }

  let allEvents = [];
  try {
    const results = await Promise.all(dates.map(fetchDateScores));
    allEvents = results.flat();
  } catch (err) {
    updateStatusBar('error');
    scheduleNext(120000);
    return;
  }

  let anyUpdated = false;
  const newLive = new Set();

  allEvents.forEach(event => {
    const comp = event.competitions?.[0];
    if (!comp) return;
    const statusName = comp.status?.type?.name || '';
    const completed   = comp.status?.type?.completed === true;
    const isLive      = statusName.includes('PROGRESS') || statusName.includes('HALF') || statusName.includes('END_PERIOD');
    const isFinal     = completed || statusName.includes('FINAL') || statusName.includes('FULL_TIME') || statusName.includes('ENDED');
    const hasFinalScore = isFinal || isLive;

    if (!hasFinalScore) return;

    const competitors = comp.competitors || [];
    const homeC = competitors.find(c => c.homeAway === 'home');
    const awayC = competitors.find(c => c.homeAway === 'away');
    if (!homeC || !awayC) return;

    const hn = ESPN_TO_LOCAL[homeC.team?.displayName] || homeC.team?.displayName;
    const an = ESPN_TO_LOCAL[awayC.team?.displayName] || awayC.team?.displayName;
    const hs = String(homeC.score ?? '');
    const as_ = String(awayC.score ?? '');

    // ── Group stage? ──
    let mid = MATCH_LOOKUP[`${hn}|${an}`] || MATCH_LOOKUP[`${an}|${hn}`];
    if (mid) {
      if (!hasFinalScore) return;
      const match = MATCHES.find(m => m.id === mid);
      if (!match) return;
      let sh = hs, sa = as_;
      if (match.h !== hn) { sh = as_; sa = hs; }
      if (isLive) newLive.add(mid);
      const prev = scores[mid] || {};
      if (prev.h !== sh || prev.a !== sa) { scores[mid] = { h: sh, a: sa }; anyUpdated = true; }
      return;
    }

    // ── Knockout stage? — match by Paraguay date+time ──
    const koKey = espnDateToKoKey(event.date || comp.date || '');
    mid = KO_TIME_LOOKUP[koKey];
    if (!mid) return;

    // Save team names as soon as ESPN announces them (before kick-off)
    const isTBD = !hn || !an || hn.toLowerCase().includes('tbd') || an.toLowerCase().includes('tbd');
    if (!isTBD) {
      const prev = koTeams[mid] || {};
      if (prev.h !== hn || prev.a !== an) { koTeams[mid] = { h: hn, a: an }; anyUpdated = true; }
    }
    // Save scores when live or finished
    if (hasFinalScore) {
      if (isLive) newLive.add(mid);
      const prev = scores[mid] || {};
      if (prev.h !== hs || prev.a !== as_) { scores[mid] = { h: hs, a: as_ }; anyUpdated = true; }
    }
  });

  liveMatchIds = newLive;
  lastFetchTime = new Date();

  if (anyUpdated) refreshAll();

  updateStatusBar(newLive.size > 0 ? 'live' : 'ok');
  scheduleNext(newLive.size > 0 ? 30000 : 90000);
}

function scheduleNext(ms) {
  clearTimeout(autoRefreshTimer);
  autoRefreshTimer = setTimeout(fetchLiveScores, ms);
}

function updateStatusBar(state) {
  const bar = document.getElementById('liveBar');
  if (!bar) return;
  const t = lastFetchTime
    ? lastFetchTime.toLocaleTimeString('es-PY', {hour:'2-digit',minute:'2-digit'})
    : '–';
  const refreshBtn = `<button onclick="fetchLiveScores()" style="
    background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.4);
    color:white;padding:2px 10px;border-radius:10px;cursor:pointer;font-size:0.82em;
    margin-left:10px;font-weight:700">↻ Actualizar</button>`;
  if (state === 'live') {
    bar.style.background = '#009a44';
    bar.innerHTML = `🔴 <b>PARTIDOS EN VIVO</b> — Actualizando cada 30 seg · Última actualización: ${t} ${refreshBtn}`;
  } else if (state === 'error') {
    bar.style.background = '#c8102e';
    bar.innerHTML = `⚠️ Sin conexión con el servidor de resultados · Última actualización: ${t} ${refreshBtn}`;
  } else {
    bar.style.background = '#1a3a8f';
    bar.innerHTML = `✅ Resultados actualizados automáticamente · Última actualización: ${t} ${refreshBtn}`;
  }
}

// =====================================================
// INIT
// =====================================================
document.getElementById('teamSelect').value = myTeam;
document.getElementById('myTeamBadge').textContent = TEAM_FLAGS[myTeam]||'';
updateTZBar();
renderGroups();
renderByDate();
renderKnockout();
renderPrint();
// Start live score fetching
fetchLiveScores();
</script>
