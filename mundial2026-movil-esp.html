<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a1f5c">
<title>Mundial FIFA 2026 🏆</title>
<style>
/* ===== BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f7;color:#1a1a2e;font-size:15px;padding-bottom:70px;min-height:100vh}

/* ===== VARIABLES ===== */
:root{
  --azul:#0a1f5c;--azul2:#1a3a8f;--rojo:#c8102e;--verde:#009a44;
  --oro:#d4a017;--gris:#f0f2f7;--borde:#dde1e7;--card:#fff;
}

/* ===== HEADER ===== */
.app-header{
  background:linear-gradient(135deg,var(--azul) 0%,var(--azul2) 100%);
  color:white;padding:12px 16px 10px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
}
.app-header img{height:44px;filter:brightness(0)invert(1)}
.app-header-text h1{font-size:1.05em;font-weight:900;letter-spacing:0.3px;line-height:1.1}
.app-header-text p{font-size:0.72em;opacity:0.8;margin-top:1px}
.live-dot{width:8px;height:8px;background:#ff4444;border-radius:50%;
  animation:pulse 1.2s infinite;margin-left:auto;display:none}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}

/* ===== LIVE BAR ===== */
#liveBar{
  background:var(--azul2);color:white;text-align:center;
  padding:6px 12px;font-size:0.78em;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
#liveBar button{
  background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.35);
  color:white;padding:3px 10px;border-radius:20px;cursor:pointer;
  font-size:0.85em;font-weight:700;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--azul);display:flex;border-top:2px solid rgba(255,255,255,0.1);
  box-shadow:0 -4px 16px rgba(0,0,0,0.3);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px 10px;color:rgba(255,255,255,0.55);cursor:pointer;
  font-size:0.68em;font-weight:600;border:none;background:none;
  transition:color 0.15s;
}
.nav-btn .nav-icon{font-size:1.4em;line-height:1}
.nav-btn.active{color:var(--oro)}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 4px rgba(212,160,23,0.6))}

/* ===== PAGES ===== */
.page{display:none;padding:12px 12px 4px;animation:fadeIn 0.2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ===== SECTION TITLE ===== */
.section-title{
  font-size:0.78em;font-weight:800;text-transform:uppercase;letter-spacing:1px;
  color:var(--azul2);margin:16px 0 8px;padding-left:2px;
  display:flex;align-items:center;gap:6px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--borde)}

/* ===== MATCH CARD ===== */
.match-card{
  background:var(--card);border-radius:14px;margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.07);overflow:hidden;
  border:1px solid var(--borde);
}
.match-card.paraguay{border-left:4px solid var(--verde);background:#f8fff8}
.match-card.live{border-left:4px solid #ff4444;background:#fff8f8}
.match-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;background:#f5f7fc;border-bottom:1px solid var(--borde);
  font-size:0.73em;color:#555;
}
.match-card-header .grp-badge{
  background:var(--azul);color:white;border-radius:8px;
  padding:1px 7px;font-weight:700;font-size:0.9em;
}
.match-card-header .time{color:var(--rojo);font-weight:800;font-size:1.05em}
.match-card-header .live-badge{
  background:#ff4444;color:white;border-radius:8px;
  padding:1px 7px;font-weight:700;font-size:0.85em;animation:pulse 1.2s infinite;
}
.match-body{
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:8px;padding:12px 14px;
}
.team-name{font-weight:700;font-size:0.95em;line-height:1.2}
.team-home{text-align:right}
.team-away{text-align:left}
.score-area{display:flex;align-items:center;gap:6px;justify-content:center}
.score-box{
  width:36px;height:36px;border:2px solid #c5cfe8;border-radius:8px;
  text-align:center;font-size:1.1em;font-weight:900;color:var(--azul);
  background:white;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color 0.15s,background 0.15s;
}
.score-box.filled{border-color:var(--azul);background:#f0f4ff}
.score-colon{font-size:1.2em;font-weight:900;color:#aaa}
.match-footer{
  padding:4px 12px 7px;font-size:0.72em;color:#777;
  display:flex;align-items:center;gap:4px;
}

/* ===== SCORE MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn 0.15s ease;
}
.modal-overlay.hidden{display:none}
.modal-sheet{
  background:white;border-radius:24px 24px 0 0;padding:20px 20px 32px;
  width:100%;max-width:420px;box-shadow:0 -8px 32px rgba(0,0,0,0.2);
}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:1em;font-weight:800;text-align:center;margin-bottom:4px;color:var(--azul)}
.modal-subtitle{font-size:0.78em;color:#777;text-align:center;margin-bottom:16px}
.modal-teams{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.modal-team{flex:1;text-align:center;font-weight:700;font-size:0.95em}
.modal-inputs{display:flex;align-items:center;gap:12px;justify-content:center}
.modal-input{
  width:64px;height:64px;border:2px solid var(--borde);border-radius:12px;
  text-align:center;font-size:1.6em;font-weight:900;color:var(--azul);
  background:white;-moz-appearance:textfield;
}
.modal-input::-webkit-inner-spin-button{display:none}
.modal-input:focus{outline:none;border-color:var(--azul);background:#f0f4ff}
.modal-colon{font-size:1.8em;font-weight:900;color:#ccc}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-cancel{flex:1;padding:13px;border:2px solid var(--borde);border-radius:12px;
  background:white;font-size:0.95em;font-weight:700;color:#666;cursor:pointer}
.btn-save{flex:2;padding:13px;border:none;border-radius:12px;
  background:var(--azul);color:white;font-size:0.95em;font-weight:800;cursor:pointer}
.btn-clear{width:100%;margin-top:8px;padding:10px;border:none;border-radius:10px;
  background:#fee;color:var(--rojo);font-size:0.88em;font-weight:700;cursor:pointer}

/* ===== GROUP STANDINGS ===== */
.group-card{
  background:white;border-radius:14px;margin-bottom:12px;
  overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07);border:1px solid var(--borde);
}
.group-card-hdr{
  padding:10px 14px;display:flex;align-items:center;gap:10px;color:white;font-weight:800;
}
.group-letter-badge{
  width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:1.1em;font-weight:900;
}
.group-card-hdr h3{font-size:0.95em}
.group-card-hdr .teams-preview{font-size:0.7em;opacity:0.8;font-weight:400;margin-top:1px}
.standings-mini{width:100%;border-collapse:collapse;font-size:0.82em}
.standings-mini th{background:#eef1f8;padding:5px 8px;text-align:center;font-size:0.75em;
  font-weight:700;color:var(--azul);text-transform:uppercase}
.standings-mini th:first-child{text-align:left}
.standings-mini td{padding:7px 8px;text-align:center;border-bottom:1px solid #f5f5f5}
.standings-mini td:first-child{text-align:left;font-weight:600}
.standings-mini tr:last-child td{border-bottom:none}
.standings-mini .q{background:#e8f5e9}
.standings-mini .pts{font-weight:800;color:var(--azul)}
.qualify-line td{border-top:2px dashed var(--verde)!important}

/* Group toggle */
.group-matches-toggle{
  padding:10px 14px;font-size:0.8em;font-weight:700;color:var(--azul2);
  cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--borde);background:#f8f9fc;
  user-select:none;
}
.group-matches-list{display:none;padding:8px}
.group-matches-list.open{display:block}

/* Group header colors (same as desktop) */
.gh-A{background:#0a1f5c}.gh-B{background:#1a5276}.gh-C{background:#1a3a8f}
.gh-D{background:#006400}.gh-E{background:#7b241c}.gh-F{background:#4a235a}
.gh-G{background:#154360}.gh-H{background:#7d6608}.gh-I{background:#0e6655}
.gh-J{background:#6e2f0a}.gh-K{background:#1b4332}.gh-L{background:#c0392b}

/* ===== GROUP FILTER BAR ===== */
.group-filter{
  display:flex;gap:6px;overflow-x:auto;padding:0 0 8px;
  scrollbar-width:none;margin-bottom:4px;
}
.group-filter::-webkit-scrollbar{display:none}
.gf-btn{
  flex-shrink:0;padding:5px 12px;border-radius:20px;border:2px solid var(--borde);
  background:white;font-size:0.82em;font-weight:700;color:#555;cursor:pointer;
  transition:all 0.15s;
}
.gf-btn.active{background:var(--azul);color:white;border-color:var(--azul)}

/* ===== KNOCKOUT ===== */
.ko-phase-title{
  display:flex;align-items:center;gap:8px;margin:16px 0 8px;
}
.ko-phase-title span{
  background:var(--azul);color:white;padding:4px 12px;border-radius:20px;
  font-size:0.78em;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;
}
.ko-phase-title::after{content:'';flex:1;height:1px;background:var(--borde)}

/* ===== PARAGUAY HIGHLIGHT ===== */
.py-matches-header{
  background:linear-gradient(135deg,#006400,#009a44);color:white;
  border-radius:14px;padding:12px 16px;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.py-matches-header .py-flag{font-size:2em}
.py-matches-header h2{font-size:1em;font-weight:800}
.py-matches-header p{font-size:0.78em;opacity:0.85;margin-top:2px}

/* ===== TODAY SECTION ===== */
.today-date{
  text-align:center;background:var(--azul);color:white;
  border-radius:12px;padding:8px;margin-bottom:12px;
  font-weight:700;font-size:0.88em;
}
.no-matches{
  text-align:center;padding:30px 16px;color:#888;font-size:0.9em;
}
.no-matches .emoji{font-size:2.5em;display:block;margin-bottom:8px}

/* ===== DATE FILTER ===== */
.date-nav{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;
}
.date-nav::-webkit-scrollbar{display:none}
.date-btn{
  flex-shrink:0;padding:6px 12px;border-radius:20px;border:2px solid var(--borde);
  background:white;font-size:0.8em;font-weight:700;color:#555;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
}
.date-btn.active{background:var(--azul);color:white;border-color:var(--azul)}

/* ===== TEAM PICKER ===== */
.team-picker-bar{
  background:#0c2470;padding:8px 14px;
  display:flex;flex-direction:column;gap:8px;
  border-bottom:1px solid rgba(255,255,255,0.12);
}
.tp-row{display:flex;align-items:center;gap:10px}
.tp-label{color:rgba(255,255,255,0.8);font-size:0.8em;font-weight:700;white-space:nowrap}
#teamSelect{
  flex:1;padding:6px 10px;border-radius:10px;border:none;
  background:#fff;color:#1a1a2e;font-size:0.88em;font-weight:700;cursor:pointer;
}
#teamSelect option,#teamSelect optgroup{background:#fff;color:#1a1a2e}

/* ===== TIMEZONE BAR ===== */
.tz-row{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding-top:2px;
}
.tz-info{color:rgba(255,255,255,0.75);font-size:0.75em}
.tz-toggle{
  padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.35);
  background:rgba(255,255,255,0.12);color:white;font-size:0.75em;font-weight:700;
  cursor:pointer;white-space:nowrap;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">

    <optgroup label="Grupo K">

    </optgroup>
    <optgroup label="Grupo L">
      <option>Inglaterra</option><option>Croacia</option><option>Ghana</option><option>Panamá</option>
    </optgroup>
  </select>
  </div>
  <div class="tz-row">
    <span class="tz-info" id="tzInfo">🕐 Detectando zona horaria…</span>
    <button class="tz-toggle" id="tzToggleBtn" onclick="toggleTimezone()">🌍 Hora local</button>
  </div>
</div>

<!-- LIVE BAR -->
<div id="liveBar">
  <span id="liveBarText">⏳ Cargando resultados…</span>
  <button onclick="fetchLiveScores()">↻</button>
</div>

<!-- PAGES -->
<div id="page-hoy" class="page active">
  <div id="pyMatches"></div>
  <div id="todayMatches"></div>
</div>

<div id="page-fecha" class="page">
  <div class="date-nav" id="dateNav"></div>
  <div id="dateMatches"></div>
</div>

<div id="page-grupos" class="page">
  <div class="group-filter" id="groupFilter"></div>
  <div id="groupsContent"></div>
</div>

<div id="page-ko" class="page">
  <div id="knockoutContent"></div>
</div>

<!-- SCORE MODAL -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Ingresar resultado</div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div class="modal-teams">
      <div class="modal-team" id="modalHome"></div>
      <div style="width:8px;text-align:center;color:#ccc;font-weight:900">vs</div>
      <div class="modal-team" id="modalAway"></div>
    </div>
    <div class="modal-inputs">
      <input class="modal-input" id="modalScoreH" type="number" min="0" max="99" placeholder="–">
      <span class="modal-colon">:</span>
      <input class="modal-input" id="modalScoreA" type="number" min="0" max="99" placeholder="–">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveModal()">✓ Guardar</button>
    </div>
    <button class="btn-clear" onclick="clearModal()">✕ Borrar resultado</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('hoy',this)">
    <span class="nav-icon">🏠</span>Hoy
  </button>
  <button class="nav-btn" onclick="showPage('fecha',this)">
    <span class="nav-icon">📅</span>Fechas
  </button>
  <button class="nav-btn" onclick="showPage('grupos',this)">
    <span class="nav-icon">📊</span>Grupos
  </button>
  <button class="nav-btn" onclick="showPage('ko',this)">
    <span class="nav-icon">🏆</span>Eliminatoria
  </button>
</nav>

// =====================================================
// TIMEZONE
// =====================================================
const USER_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
const USER_OFFSET_MIN = -new Date().getTimezoneOffset(); // local UTC offset in minutes
const PY_OFFSET_MIN = -180; // Paraguay = UTC-3
let showLocalTime = USER_OFFSET_MIN !== PY_OFFSET_MIN; // auto local if different from PY

const MONTH_ES_MAP = {'Jun':5,'Jul':6};
const DAY_ES_ARR = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function parseMatchDate(dtStr){
  const [,d,mon] = dtStr.split(' ');
  return new Date(2026, MONTH_ES_MAP[mon], parseInt(d));
}
function fmtDate(d){
  return `${DAY_ES_ARR[d.getDay()]} ${d.getDate()} ${d.getMonth()===5?'Jun':'Jul'}`;
}
function getDisplayTime(timeStr, dateStr){
  if(!showLocalTime) return {time:timeStr, date:dateStr, dayMark:''};
  const [h,mn] = timeStr.split(':').map(Number);
  const base = parseMatchDate(dateStr);
  // Paraguay = UTC-3 → UTC = Paraguay + 3h
  const utcMs = Date.UTC(2026, base.getMonth(), base.getDate(), h+3, mn);
  const local = new Date(utcMs);
  const lh = local.getHours(), lm = local.getMinutes();
  const localTime = `${String(lh).padStart(2,'0')}:${String(lm).padStart(2,'0')}`;
  const localDate = fmtDate(local);
  const localMid = new Date(local.getFullYear(), local.getMonth(), local.getDate());
  const baseMid  = new Date(base.getFullYear(), base.getMonth(), base.getDate());
  const dayDiff  = Math.round((localMid - baseMid) / 86400000);
  const dayMark  = dayDiff > 0 ? ` +${dayDiff}d` : dayDiff < 0 ? ` ${dayDiff}d` : '';
  return {time:localTime, date:localDate, dayMark};
}
function fmtOffset(min){
  const s = min>=0?'+':'-', a=Math.abs(min), h=Math.floor(a/60), m=a%60;
  return `UTC${s}${h}${m?':'+String(m).padStart(2,'0'):''}`;
}
function toggleTimezone(){
  showLocalTime = !showLocalTime;
  updateTZBar();
  refreshAll();
}
function updateTZBar(){
  const info = document.getElementById('tzInfo');
  const btn  = document.getElementById('tzToggleBtn');
  if(!info||!btn) return;
  if(showLocalTime){
    info.textContent = `🕐 ${USER_TZ} (${fmtOffset(USER_OFFSET_MIN)})`;
    btn.textContent  = '🇵🇾 Ver hora PY';
  } else {
    info.textContent = '🕐 Mostrando hora Paraguay (UTC-3)';
    btn.textContent  = '🌍 Ver hora local';
  }
}
function getMyTeamGroup(){ return Object.entries(GROUPS).find(([g,ts])=>ts.includes(myTeam))?.[0]||null; }
function getMyTeamRivals(){ const g=getMyTeamGroup(); return g?GROUPS[g].filter(t=>t!==myTeam).join(' · '):''; }

  myTeam=team;
  localStorage.setItem('myTeam',team);
  refreshAll();
}

// =====================================================
function matchCardHTML(m, showGroup=true) {
  const sc = getScore(m.id);
  const hasScore = sc.h!==''&&sc.a!=='';
  const isLive = liveMatchIds.has(m.id);
  const isMT = isMyTeam(m);
  const flag = TEAM_FLAGS[myTeam]||'⚽';
  const dt = getDisplayTime(m.t, m.dt);
  let cardClass = 'match-card';
  if(isMT) cardClass += ' paraguay';
  if(isLive) cardClass += ' live';

  return `<div class="${cardClass}">
    <div class="match-card-header">
      <span>${dt.date}${dt.dayMark} · ${showGroup?`<span class="grp-badge">G-${m.g}</span> ·`:''} 🏟 ${m.st}</span>
      ${isLive
        ? `<span class="live-badge">🔴 EN VIVO</span>`
        : `<span class="time">${dt.time}</span>`}
    </div>
    <div class="match-body" onclick="openModal('${m.id}')" style="cursor:pointer">
      <div class="team-name team-home">${m.h}${isMT&&m.h===myTeam?' '+flag:''}</div>
      <div class="score-area">
        <div class="score-box ${hasScore?'filled':''}">${hasScore?sc.h:''}</div>
        <span class="score-colon">:</span>
        <div class="score-box ${hasScore?'filled':''}">${hasScore?sc.a:''}</div>
      </div>
      <div class="team-name team-away">${m.a}${isMT&&m.a===myTeam?' '+flag:''}</div>
    </div>
    ${hasScore?`<div class="match-footer">✅ Resultado guardado · Tocá para editar</div>`
               :`<div class="match-footer">✏️ Tocá para ingresar resultado</div>`}
  </div>`;
}

// =====================================================
// STANDINGS CALC
// =====================================================
function calcStandings(grp){
  const teams = GROUPS[grp];
  const table = {};
  teams.forEach(t=>table[t]={pj:0,g:0,e:0,p:0,gf:0,gc:0,gd:0,pts:0});
  MATCHES.filter(m=>m.g===grp).forEach(m=>{
    const sc=scores[m.id];
    if(!sc||sc.h===''||sc.a==='') return;
    const sh=parseInt(sc.h),sa=parseInt(sc.a);
    if(isNaN(sh)||isNaN(sa)) return;
    table[m.h].pj++;table[m.a].pj++;
    table[m.h].gf+=sh;table[m.h].gc+=sa;
    table[m.a].gf+=sa;table[m.a].gc+=sh;
    table[m.h].gd=table[m.h].gf-table[m.h].gc;
    table[m.a].gd=table[m.a].gf-table[m.a].gc;
    if(sh>sa){table[m.h].g++;table[m.h].pts+=3;table[m.a].p++;}
    else if(sh<sa){table[m.a].g++;table[m.a].pts+=3;table[m.h].p++;}
    else{table[m.h].e++;table[m.a].e++;table[m.h].pts++;table[m.a].pts++;}
  });
  return Object.entries(table).map(([name,s])=>({name,...s}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
}

function renderHoy(){
  const flag = TEAM_FLAGS[myTeam]||'⚽';
  const grp = getMyTeamGroup();
  const rivals = getMyTeamRivals();
  const grpLabel = grp ? `Grupo ${grp} — ${rivals}` : 'Fase eliminatoria';
  const myMs = MATCHES.filter(isMyTeam);
  let pyHTML = `<div class="py-matches-header">
    <div class="py-flag">${flag}</div>
    <div><h2>Partidos de ${myTeam}</h2><p>${grpLabel}</p></div>
  </div>`;
  myMs.forEach(m=>{ pyHTML += matchCardHTML(m,true); });
  document.getElementById('pyMatches').innerHTML = pyHTML;

  // Today's matches
  const todayDt = getTodayDt();
  const todayMs = MATCHES.filter(m=>m.dt===todayDt);
  let html = `<div class="today-date">📅 Hoy — ${todayDt}</div>`;
  if(todayMs.length===0){
    html += `<div class="no-matches"><span class="emoji">⏸️</span>No hay partidos programados para hoy.</div>`;
  } else {
    todayMs.forEach(m=>{ html += matchCardHTML(m,true); });
  }
  document.getElementById('todayMatches').innerHTML = html;
}

function getTodayDt(){
  const d = new Date();
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

}

// RENDER: GROUPS page
// =====================================================
function renderGroupFilter(){
  const f = document.getElementById('groupFilter');
  f.innerHTML = `<button class="gf-btn ${activeGroup==='ALL'?'active':''}" onclick="filterGroup('ALL')">Todos</button>`
    + Object.keys(GROUPS).map(g=>
        `<button class="gf-btn ${activeGroup===g?'active':''}" onclick="filterGroup('${g}')">Gr. ${g}</button>`
      ).join('');
}
function filterGroup(g){
  activeGroup=g;
  renderGroupFilter();
  renderGroups();
}
function renderGroups(){
  const grps = activeGroup==='ALL' ? Object.keys(GROUPS) : [activeGroup];
  let html = '';
  grps.forEach(grp=>{
    const rows = calcStandings(grp);
    const isPYGroup = grp===getMyTeamGroup();
    html += `<div class="group-card">
      <div class="group-card-hdr gh-${grp}">
        <div class="group-letter-badge">${grp}</div>
        <div>
          <h3>GRUPO ${grp}${isPYGroup?' '+(TEAM_FLAGS[myTeam]||'⚽'):''}</h3>
          <div class="teams-preview">${GROUPS[grp].join(' · ')}</div>
        </div>
      </div>
      <table class="standings-mini">
        <thead><tr><th>Selección</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>DG</th><th>Pts</th></tr></thead>
        <tbody>`;
    rows.forEach((r,i)=>{
      const cls = i<2?'q':(i===2?'qualify-line':'');
      html += `<tr class="${cls}">
        <td>${i<2?'🟢':i===2?'◌':'○'} ${r.name}</td>
        <td>${r.pj}</td><td>${r.g}</td><td>${r.e}</td><td>${r.p}</td>
        <td>${r.gd>0?'+'+r.gd:r.gd}</td>
        <td class="pts">${r.pts}</td>
      </tr>`;
    });
    html += `</tbody></table>
      <div class="group-matches-toggle" onclick="toggleGroupMatches('gm-${grp}',this)">
        Ver partidos del Grupo ${grp} <span>▼</span>
      </div>
      <div class="group-matches-list" id="gm-${grp}">
        ${MATCHES.filter(m=>m.g===grp).map(m=>matchCardHTML(m,false)).join('')}
      </div>
    </div>`;
  });
  document.getElementById('groupsContent').innerHTML = html;
}
function toggleGroupMatches(id, btn){
  const el = document.getElementById(id);
  el.classList.toggle('open');
  btn.querySelector('span').textContent = el.classList.contains('open') ? '▲' : '▼';
}

// =====================================================
// RENDER: KNOCKOUT page
// =====================================================
function renderKnockout(){
  let html = '';
  KNOCKOUT.forEach(phase=>{
    const isFinal = phase.phase==='🏆 FINAL';
    html += `<div class="ko-phase-title"><span>${phase.phase}</span></div>`;
    phase.matches.forEach(m=>{
      const sc=getScore(m.id);
      const hasScore=sc.h!==''&&sc.a!=='';
      const dt=getDisplayTime(m.t,m.dt);
      const teamH=koTeams[m.id]?.h||m.h;
      const teamA=koTeams[m.id]?.a||m.a;
      const flag=TEAM_FLAGS[myTeam]||'⚽';
      const isMT=teamH===myTeam||teamA===myTeam;
      const known=koTeams[m.id]!=null;
      html += `<div class="match-card${isFinal||isMT?' paraguay':''}">
        <div class="match-card-header">
          <span>${dt.date}${dt.dayMark} · 🏟 ${m.st}</span>
          <span class="time">${dt.time}</span>
        </div>
        <div class="match-body" onclick="openModal('${m.id}','ko')" style="cursor:pointer">
          <div class="team-name team-home" style="${!known?'color:#aaa;font-style:italic':''}">${teamH}${isMT&&teamH===myTeam?' '+flag:''}</div>
          <div class="score-area">
            <div class="score-box ${hasScore?'filled':''}">${hasScore?sc.h:''}</div>
            <span class="score-colon">:</span>
            <div class="score-box ${hasScore?'filled':''}">${hasScore?sc.a:''}</div>
          </div>
          <div class="team-name team-away" style="${!known?'color:#aaa;font-style:italic':''}">${teamA}${isMT&&teamA===myTeam?' '+flag:''}</div>
        </div>
        <div class="match-footer">${known?(hasScore?'✅ Resultado guardado · Tocá para editar':'✏️ Tocá para ingresar resultado'):'⏳ Equipos por definir'}</div>
      </div>`;
    });
  });
  document.getElementById('knockoutContent').innerHTML = html;
}

// =====================================================
// MODAL
// =====================================================
function openModal(id, type='group'){
  const allMatches = type==='ko'
    ? KNOCKOUT.flatMap(p=>p.matches)
    : MATCHES;
  const m = allMatches.find(m=>m.id===id) || MATCHES.find(m=>m.id===id) || KNOCKOUT.flatMap(p=>p.matches).find(m=>m.id===id);
  if(!m) return;
  modalMatchId = id;
  document.getElementById('modalTitle').textContent = 'Resultado del partido';
  document.getElementById('modalSubtitle').textContent = `${m.dt} · ${m.t} · ${m.st}`;
  document.getElementById('modalHome').textContent = m.h;
  document.getElementById('modalAway').textContent = m.a;
  const sc = getScore(id);
  document.getElementById('modalScoreH').value = sc.h;
  document.getElementById('modalScoreA').value = sc.a;
  document.getElementById('modalOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('modalScoreH').focus(),200);
}
function closeModal(e){
  if(e && e.target!==document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.add('hidden');
  modalMatchId=null;
}
function saveModal(){
  if(!modalMatchId) return;
  const h=document.getElementById('modalScoreH').value;
  const a=document.getElementById('modalScoreA').value;
  if(h!==''&&a!=='') scores[modalMatchId]={h,a};
  document.getElementById('modalOverlay').classList.add('hidden');
  modalMatchId=null;
  refreshAll();
}
function clearModal(){
  if(!modalMatchId) return;
  delete scores[modalMatchId];
  document.getElementById('modalOverlay').classList.add('hidden');
  modalMatchId=null;
  refreshAll();
}

// =====================================================
// NAVIGATION
// =====================================================
function showPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='fecha'){ renderDateNav(); renderDateMatches(); }
  if(name==='grupos'){ renderGroupFilter(); renderGroups(); }
  if(name==='ko') renderKnockout();
}

function refreshAll(){
  renderHoy();
  renderGroups();
  renderKnockout();
  if(document.getElementById('page-fecha').classList.contains('active')) renderDateMatches();
}

// =====================================================
// LIVE SCORES – ESPN API
// =====================================================
const ESPN_TO_LOCAL = {
  'Mexico':'México','South Africa':'Sudáfrica','Korea Republic':'Corea del Sur',
  'South Korea':'Corea del Sur','Czech Republic':'Rep. Checa','Czechia':'Rep. Checa',
  'Canada':'Canadá','Bosnia-Herzegovina':'Bosnia y Herz.','Bosnia and Herzegovina':'Bosnia y Herz.',
  'Qatar':'Qatar','Switzerland':'Suiza','Brazil':'Brasil','Morocco':'Marruecos',
  'Haiti':'Haití','Scotland':'Escocia','United States':'EE.UU.','USA':'EE.UU.',
  'Paraguay':'Paraguay','Australia':'Australia','Turkey':'Turquía','Türkiye':'Turquía',
  'Germany':'Alemania','Curacao':'Curazao','Curaçao':'Curazao','Curaçao':'Curazao','CUW':'Curazao','Ivory Coast':'Costa de Marfil',
  "Côte d'Ivoire":'Costa de Marfil',"Cote d'Ivoire":'Costa de Marfil',
  'Ecuador':'Ecuador','Netherlands':'Países Bajos','Japan':'Japón','Sweden':'Suecia',
  'Tunisia':'Túnez','Belgium':'Bélgica','Egypt':'Egipto','Iran':'Irán',
  'New Zealand':'Nueva Zelanda','Spain':'España','Cape Verde':'Cabo Verde',
  'Saudi Arabia':'Arabia Saudita','Uruguay':'Uruguay','France':'Francia',
  'Senegal':'Senegal','Iraq':'Irak','Norway':'Noruega','Argentina':'Argentina',
  'Algeria':'Argelia','Austria':'Austria','Jordan':'Jordania','Portugal':'Portugal',
  'DR Congo':'RD Congo','Congo DR':'RD Congo',"Democratic Republic of the Congo":'RD Congo',
  'Uzbekistan':'Uzbekistán','Colombia':'Colombia','England':'Inglaterra',
  'Croatia':'Croacia','Ghana':'Ghana','Panama':'Panamá',
};

const MATCH_LOOKUP = {};
MATCHES.forEach(m=>{ MATCH_LOOKUP[`${m.h}|${m.a}`]=m.id; });

// Knockout lookup by Paraguay date+time → match id
const KO_MON = {'Jun':'06','Jul':'07'};
const KO_TIME_LOOKUP = {};
KNOCKOUT.forEach(phase=>phase.matches.forEach(m=>{
  const [,d,mon] = m.dt.split(' ');
  const ymd = `2026${KO_MON[mon]}${String(parseInt(d)).padStart(2,'0')}`;
  KO_TIME_LOOKUP[`${ymd}|${m.t}`] = m.id;
}));

// Convert ESPN UTC date string → "YYYYMMDD|HH:MM" in Paraguay time (UTC-3)
function espnDateToKoKey(utcStr){
  if(!utcStr) return '';
  const py = new Date(new Date(utcStr).getTime() - 3*60*60*1000);
  const ymd = `${py.getUTCFullYear()}${String(py.getUTCMonth()+1).padStart(2,'0')}${String(py.getUTCDate()).padStart(2,'0')}`;
  const t   = `${String(py.getUTCHours()).padStart(2,'0')}:${String(py.getUTCMinutes()).padStart(2,'0')}`;
  return `${ymd}|${t}`;
}

let autoRefreshTimer=null;
let lastFetchTime=null;

function dateToStr(d){ return d.toISOString().slice(0,10).replace(/-/g,''); }

async function fetchLiveScores(){
  const now=new Date();
  const start=new Date('2026-06-11');
  const dates=[];
  for(let d=new Date(start);d<=now;d.setDate(d.getDate()+1)) dates.push(dateToStr(new Date(d)));

  let allEvents=[];
  try{
    const res = await Promise.all(dates.map(async d=>{
      const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${d}`,{cache:'no-store'});
      if(!r.ok) return [];
      const data=await r.json();
      return data.events||[];
    }));
    allEvents=res.flat();
  } catch(e){
    updateLiveBar('error');
    scheduleNext(120000);
    return;
  }

  let updated=false;
  const newLive=new Set();

  allEvents.forEach(ev=>{
    const comp=ev.competitions?.[0];
    if(!comp) return;
    const statusName=comp.status?.type?.name||'';
    const completed=comp.status?.type?.completed===true;
    const isLive=statusName.includes('PROGRESS')||statusName.includes('HALF')||statusName.includes('END_PERIOD');
    const isFinal=completed||statusName.includes('FINAL')||statusName.includes('FULL_TIME')||statusName.includes('ENDED');

    const home=comp.competitors?.find(c=>c.homeAway==='home');
    const away=comp.competitors?.find(c=>c.homeAway==='away');
    if(!home||!away) return;

    const hn=ESPN_TO_LOCAL[home.team?.displayName]||home.team?.displayName;
    const an=ESPN_TO_LOCAL[away.team?.displayName]||away.team?.displayName;
    const hs=String(home.score??'');
    const as_=String(away.score??'');

    // ── Group stage match? ──
    let mid=MATCH_LOOKUP[`${hn}|${an}`]||MATCH_LOOKUP[`${an}|${hn}`];
    if(mid){
      if(!isFinal&&!isLive) return;
      const match=MATCHES.find(m=>m.id===mid);
      if(!match) return;
      let sh=hs,sa=as_;
      if(match.h!==hn){sh=as_;sa=hs;}
      if(isLive) newLive.add(mid);
      const prev=scores[mid]||{};
      if(prev.h!==sh||prev.a!==sa){ scores[mid]={h:sh,a:sa}; updated=true; }
      return;
    }

    // ── Knockout stage match? — match by Paraguay date+time ──
    const koKey=espnDateToKoKey(ev.date||comp.date||'');
    mid=KO_TIME_LOOKUP[koKey];
    if(!mid) return;

    // Save team names as soon as ESPN knows them (even before match starts)
    const isTBD = !hn||!an||hn.toLowerCase().includes('tbd')||an.toLowerCase().includes('tbd');
    if(!isTBD){
      const prev=koTeams[mid]||{};
      if(prev.h!==hn||prev.a!==an){ koTeams[mid]={h:hn,a:an}; updated=true; }
    }
    // Save scores once match is live or finished
    if(isFinal||isLive){
      if(isLive) newLive.add(mid);
      const sh=hs, sa=as_;
      const prev=scores[mid]||{};
      if(prev.h!==sh||prev.a!==sa){ scores[mid]={h:sh,a:sa}; updated=true; }
    }
  });

  liveMatchIds=newLive;
  lastFetchTime=new Date();
  if(updated) refreshAll();

  // Show live dot in header
  document.getElementById('liveDot').style.display = newLive.size>0 ? 'block' : 'none';

  updateLiveBar(newLive.size>0?'live':'ok');
  scheduleNext(newLive.size>0?30000:90000);
}

function scheduleNext(ms){
  clearTimeout(autoRefreshTimer);
  autoRefreshTimer=setTimeout(fetchLiveScores,ms);
}

function updateLiveBar(state){
  const t=lastFetchTime
    ? lastFetchTime.toLocaleTimeString('es-PY',{hour:'2-digit',minute:'2-digit'})
    : '–';
  const bar=document.getElementById('liveBarText');
  if(state==='live'){
    document.getElementById('liveBar').style.background='#009a44';
    bar.textContent=`🔴 PARTIDOS EN VIVO · Actualización en 30 seg · ${t}`;
  } else if(state==='error'){
    document.getElementById('liveBar').style.background='#c8102e';
    bar.textContent=`⚠️ Sin conexión · Última actualización: ${t}`;
  } else {
    document.getElementById('liveBar').style.background='#1a3a8f';
    bar.textContent=`✅ Actualizado · ${t}`;
  }
}
